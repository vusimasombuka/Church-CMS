{% extends "base.html" %}
{% block title %}Add Branch{% endblock %}

{% block content %}

<h2>Add New Branch</h2>

<form method="POST">

    <label>Branch Name</label>
    <input type="text" name="name" required>

    <label>Location</label>
    <input type="text" name="location">

    <button type="submit">Create Branch</button>

</form>

{% endblock %}
