{% extends "base.html" %}
{% block title %}Check In{% endblock %}

{% block content %}
<h2>Church Check-In</h2>

<form method="POST">

    <label>Cellphone Number</label>
    <input name="phone" placeholder="0821234567 or +27821234567">

    <label>Service Attended</label>
    <select name="service_id" required>
        <option value="">-- Select Service --</option>
        {% for service in services %}
            <option value="{{ service.id }}">
                {{ service.name }} - {{ service.day_of_week }} {{ service.time }}
                {% if current_user.role == "super_admin" and service.branch %}
                    ({{ service.branch.name }})
                {% endif %}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Check In</button>
    
</form>

<!-- ADDED: Link for visitors without phones -->
<p style="margin-top: 30px; text-align: center;">
    <a href="{{ url_for('checkin.check_in_no_phone') }}" style="color: #1abc9c; text-decoration: underline; font-weight: 600;">
        Check in visitor without phone number →
    </a>
</p>

{% endblock %}
