{% extends "base.html" %}
{% block title %}Check In - No Phone{% endblock %}

{% block content %}
<h2>Check In Without Phone</h2>

<form method="POST" action="{{ url_for('checkin.check_in') }}">
    
    <label>First Name *</label>
    <input name="first_name" required placeholder="Visitor's first name">

    <label>Last Name *</label>
    <input name="last_name" required placeholder="Visitor's last name">
    
    <label>Service Attended *</label>
    <select name="service_id" required>
        <option value="">-- Select Service --</option>
        {% for service in services %}
            <option value="{{ service.id }}">
                {{ service.name }} - {{ service.day_of_week }} {{ service.time }}
                {% if current_user.role == "super_admin" and service.branch %}
                    ({{ service.branch.name }})
                {% endif %}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Check In</button>
</form>

<p style="margin-top: 20px;">
    <a href="{{ url_for('checkin.check_in') }}">← Back to phone check-in</a>
</p>
{% endblock %}
